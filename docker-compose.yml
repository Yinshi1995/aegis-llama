services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  aegis:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - PORT=7860
    volumes:
      - ./knowledge_base:/app/knowledge_base
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./app/tools/plugins:/app/app/tools/plugins

volumes:
  ollama_data:
